name: verify
on:
  workflow_dispatch:   # full pipeline is manual-only — it's a heavy ~60-90 min Isabelle/AFP build

# Full pipeline — SAW (C == Cryptol) + Isabelle (model == FIPS/math spec). Run on demand from the
# Actions tab ("Run workflow") for a complete re-verification. The everyday gating check is the
# separate, fast `saw` workflow that runs on every push. We cache only `.tools` (the downloaded
# toolchain); caching the Isabelle heaps does NOT make `isabelle build` skip the AFP rebuild on
# hosted runners, so the AFP/Cryptol session is (re)built each run (~50-90 min). macOS Apple Silicon
# (matches the pinned arm64 SAW binary).
jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Cache downloaded toolchain (.tools)
        uses: actions/cache@v4
        with:
          path: .tools
          key: tools-full-${{ runner.os }}-${{ hashFiles('scripts/setup.sh', 'scripts/setup_isabelle_cryptol.sh') }}
      - name: Set up toolchain (SAW, Cryptol, Isabelle, clang)
        run: ./scripts/setup.sh
      - name: Build AFP + SAW 'Cryptol' Isabelle session
        run: ./scripts/setup_isabelle_cryptol.sh
      - name: Reject proof holes (no sorry/oops/admit)
        run: |
          if grep -rnE --include='*.thy' '\b(sorry|oops|admit)\b' spec/; then
            echo "::error::Found a proof hole (sorry/oops/admit) in spec/."; exit 1
          fi
      - name: Full pipeline — lift-check + SAW (C==Cryptol) + Isabelle (model==spec)
        run: make verify
