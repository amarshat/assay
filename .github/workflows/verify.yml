name: verify
on:
  push:
  pull_request:
  workflow_dispatch:   # the heavy full-pipeline job runs only when manually triggered

# Two jobs:
#  - saw:    runs on every push/PR. Fast (~1 min cached) — the SAW leg, C montgomery_reduce ==
#            Cryptol model. This is the gating check.
#  - verify: runs ONLY on manual dispatch (Actions tab -> Run workflow). Full pipeline — SAW +
#            Isabelle (model == FIPS/math spec). Heavy: first run downloads Isabelle + AFP and builds
#            the SAW 'Cryptol' session (~45-60 min on a CI runner), then cached. Kept off per-push CI
#            so pushes stay fast and reliably green; trigger it on demand to re-confirm the full proof.
#            Both jobs run on macOS Apple Silicon (matches the pinned arm64 SAW binary).
jobs:
  saw:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Cache toolchain (.tools)
        uses: actions/cache@v4
        with:
          path: .tools
          key: tools-saw1.5.1-${{ runner.os }}-${{ hashFiles('scripts/setup.sh') }}
      - name: Set up toolchain (SAW + clang; Isabelle skipped)
        run: SKIP_ISABELLE=1 ./scripts/setup.sh
      - name: Reject proof holes (no `sorry`)
        run: |
          if grep -rn --include='*.thy' '\bsorry\b' spec/; then
            echo "::error::Found 'sorry' (proof hole) in spec/."; exit 1
          fi
      - name: Prove C == Cryptol model (SAW)
        run: make saw

  verify:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 180
    env:
      # keep Isabelle's heaps + component registrations inside the workspace so they cache
      ISABELLE_HOME_USER: ${{ github.workspace }}/.isabelle_home
    steps:
      - uses: actions/checkout@v4
      - name: Cache toolchain + AFP + Isabelle heaps
        uses: actions/cache@v4
        with:
          path: |
            .tools
            .isabelle_home
          key: full-${{ runner.os }}-${{ hashFiles('scripts/setup.sh', 'scripts/setup_isabelle_cryptol.sh') }}
      - name: Set up toolchain (SAW, Cryptol, Isabelle, clang)
        run: ./scripts/setup.sh
      - name: Build AFP + SAW 'Cryptol' Isabelle session (cached after first run)
        run: ./scripts/setup_isabelle_cryptol.sh
      - name: Reject proof holes (no `sorry`)
        run: |
          if grep -rn --include='*.thy' '\bsorry\b' spec/; then
            echo "::error::Found 'sorry' (proof hole) in spec/."; exit 1
          fi
      - name: Full pipeline — SAW (C==Cryptol) + Isabelle (model==spec)
        run: make verify
